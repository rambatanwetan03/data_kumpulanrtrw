<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-blue-600 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">

                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />

            <form id="loginForm" class="space-y-4">

                    <input type="text" id="username" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" required>
                </div>
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="relative">
                        <input type="password" id="password" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" required>
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-blue-600 focus:outline-none">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />

                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
                    Masuk
                </button>
            </form>
            <div id="loginError" class="hidden mt-4 text-center text-red-500 text-sm bg-red-50 p-2 rounded">

    <!-- Main Dashboard -->

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

                    <button onclick="downloadExcel()" class="inline-flex items-center px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 transition">

                    <button onclick="downloadWord()" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">

            </div>

            <!-- Table Card -->

                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">

                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama</th>

                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No SK</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tahun SK</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Alamat</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No HP</th>
                                <th class="admin-col hidden px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Data rows will appear here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="dataModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-full max-w-lg mx-auto rounded-xl shadow-lg z-50 overflow-y-auto">
            <div class="modal-content py-4 text-left px-6">

                    <p class="text-xl font-bold text-gray-900" id="modalTitle">Tambah Data Penduduk</p>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <form id="pendudukForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="hidden" id="editIndex" value="">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                        <input type="text" id="formNama" class="mt-1 block w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tanggal Lahir</label>
                        <input type="text" id="formTgl" placeholder="DD-MM-YYYY" class="mt-1 block w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">No SK</label>
                        <input type="text" id="formSK" class="mt-1 block w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tahun SK</label>
                        <input type="number" id="formTahun" class="mt-1 block w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">No HP</label>
                        <input type="text" id="formHP" class="mt-1 block w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Alamat</label>
                        <textarea id="formAlamat" rows="2" class="mt-1 block w-full px-3 py-2 border rounded-lg" required></textarea>
                    </div>
                    <div class="sm:col-span-2 pt-4 flex justify-end space-x-3 border-t">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">Batal</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

        let currentUser = null;

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (u === "Kliwon03" && p === "Ramwet03") {
                currentUser = { username: "Kliwon03", role: "Viewer" };
                initApp();
            } else if (u === "Ameth03" && p === "Ramwet03") {
                currentUser = { username: "Ameth03", role: "Admin" };
                initApp();
            } else {
                errorEl.classList.remove('hidden');
            }
        });

        function initApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = currentUser.username;
            document.getElementById('userRoleName').innerText = currentUser.role === 'Admin' ? 'Akses Penuh' : 'Hanya Lihat';

            if (currentUser.role === 'Admin') {
                document.getElementById('adminActions').classList.remove('hidden');
                document.querySelectorAll('.admin-col').forEach(el => el.classList.remove('hidden'));
            }

            renderTable();
        }

        function logout() {
            location.reload();
        }

        // Table Render
        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            pendudukData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.no}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.nama}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.tgl}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.sk}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.tahun}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.alamat}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.hp}</td>
                    <td class="admin-col ${currentUser.role !== 'Admin' ? 'hidden' : ''} px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                        <button onclick="editData(${index})" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                        <button onclick="deleteData(${index})" class="text-red-600 hover:text-red-900">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Modal Controls
        function openModal(editIdx = null) {
            const modal = document.getElementById('dataModal');
            const form = document.getElementById('pendudukForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();
            document.getElementById('editIndex').value = editIdx !== null ? editIdx : "";
            title.innerText = editIdx !== null ? "Edit Data Penduduk" : "Tambah Data Penduduk";

            if (editIdx !== null) {
                const d = pendudukData[editIdx];
                document.getElementById('formNama').value = d.nama;
                document.getElementById('formTgl').value = d.tgl;
                document.getElementById('formSK').value = d.sk;
                document.getElementById('formTahun').value = d.tahun;
                document.getElementById('formAlamat').value = d.alamat;
                document.getElementById('formHP').value = d.hp;
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() {
            const modal = document.getElementById('dataModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        // CRUD Operations
        document.getElementById('pendudukForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editIdx = document.getElementById('editIndex').value;
            
            const newData = {
                nama: document.getElementById('formNama').value,
                tgl: document.getElementById('formTgl').value,
                sk: document.getElementById('formSK').value,
                tahun: parseInt(document.getElementById('formTahun').value),
                alamat: document.getElementById('formAlamat').value,
                hp: document.getElementById('formHP').value
            };

            if (editIdx !== "") {
                const idx = parseInt(editIdx);
                pendudukData[idx] = { ...pendudukData[idx], ...newData };
            } else {
                const newNo = pendudukData.length > 0 ? Math.max(...pendudukData.map(o => o.no)) + 1 : 1;
                pendudukData.push({ no: newNo, ...newData });
            }

            renderTable();
            closeModal();
        });

        function editData(index) {
            openModal(index);
        }

        function deleteData(index) {
            if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                pendudukData.splice(index, 1);
                renderTable();
            }
        }

        // Export Functions
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            doc.text("DATA PENDUDUK RAMBATAN WETAN", 14, 15);
            
            const headers = [["NO", "NAMA", "TGL LAHIR", "NO SK", "TAHUN SK", "ALAMAT", "NO HP"]];
            const data = pendudukData.map(item => [
                item.no, item.nama, item.tgl, item.sk, item.tahun, item.alamat, item.hp
            ]);

            doc.autoTable({
                head: headers,
                body: data,
                startY: 20,
                theme: 'grid',
                styles: { fontSize: 8 }
            });

            doc.save("Data_Penduduk.pdf");
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(pendudukData.map(i => ({
                "NO": i.no,
                "NAMA": i.nama,
                "TANGGAL LAHIR": i.tgl,
                "NO SK": i.sk,
                "TAHUN SK": i.tahun,
                "ALAMAT": i.alamat,
                "NO HP": i.hp
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Penduduk");
            XLSX.writeFile(wb, "Data_Penduduk.xlsx");
        }

        function downloadWord() {
            let html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Data Penduduk</title></head>
                <body>
                    <h2 style='text-align:center'>DATA PENDUDUK RAMBATAN WETAN</h2>
                    <table border='1' cellspacing='0' cellpadding='5' style='width:100%; border-collapse:collapse;'>
                        <thead>
                            <tr style='background-color:#f2f2f2'>
                                <th>NO</th><th>NAMA</th><th>TGL LAHIR</th><th>NO SK</th><th>TAHUN SK</th><th>ALAMAT</th><th>NO HP</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            pendudukData.forEach(item => {
                html += `
                    <tr>
                        <td>${item.no}</td><td>${item.nama}</td><td>${item.tgl}</td>
                        <td>${item.sk}</td><td>${item.tahun}</td><td>${item.alamat}</td><td>${item.hp}</td>
                    </tr>
                `;
            });
            
            html += "</tbody></table></body></html>";
            
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = "Data_Penduduk.doc";
            link.click();
        }
    </script>
</body>
