<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendataan RT/RW - Rambatan Wetan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Screen Login Sederhana -->
    <div id="loginScreen" class="fixed inset-0 bg-blue-900 z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-blue-900">MASUK SISTEM</h1>
                <p class="text-gray-500 text-xs">Desa Rambatan Wetan</p>
            </div>
            
            <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 text-xs font-bold text-center rounded">
                Username atau Password Salah!
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <input type="text" id="loginUsername" placeholder="Username" required class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>
                <div>
                    <input type="password" id="loginPassword" placeholder="Password" required class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-all active:scale-95">
                    LOG IN
                </button>
            </form>
        </div>
    </div>

    <!-- Konten Utama Aplikasi -->
    <div id="mainApp" class="hidden">
        <header class="bg-blue-800 text-white p-4 shadow-lg no-print">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold uppercase">Rambatan Wetan</h1>
                    <p class="text-[10px] opacity-80">ADMINISTRASI WARGA</p>
                </div>
                <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold">
                    KELUAR
                </button>
            </div>
        </header>

        <main class="container mx-auto p-4 md:p-8">
            <!-- Statistik Ringkas -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-[10px] text-gray-500 uppercase font-bold">Total Warga</p>
                    <h3 id="statTotal" class="text-2xl font-bold">0</h3>
                </div>
                <div id="statusIndicator" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-[10px] text-gray-500 uppercase font-bold">Status Koneksi</p>
                    <h3 id="statusText" class="text-xs font-bold text-red-500">OFFLINE</h3>
                </div>
            </div>

            <!-- Form Input -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-8 no-print">
                <h2 class="text-sm font-bold text-gray-700 uppercase mb-4">Input Data Baru</h2>
                <form id="dataForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input type="hidden" id="editId">
                    <input type="text" id="nama" placeholder="Nama Lengkap" required class="border rounded-lg p-2 text-sm">
                    <div class="flex gap-2">
                        <select id="tipeWilayah" class="border rounded-lg p-2 text-sm w-1/2">
                            <option value="RT">RT</option>
                            <option value="RW">RW</option>
                        </select>
                        <input type="number" id="noWilayah" placeholder="No" required class="border rounded-lg p-2 text-sm w-1/2">
                    </div>
                    <input type="text" id="rekening" placeholder="No. Rekening" required class="border rounded-lg p-2 text-sm">
                    <button type="submit" id="submitBtn" class="bg-blue-600 text-white font-bold rounded-lg text-xs uppercase hover:bg-blue-700">Simpan Data</button>
                </form>
            </div>

            <!-- Tabel Data -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center no-print">
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Cari..." class="border rounded-full px-4 py-1 text-sm outline-none w-64">
                    <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-bold">EXPORT EXCEL</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-[10px] font-bold uppercase text-gray-600">
                            <tr>
                                <th class="px-4 py-3 border">No</th>
                                <th class="px-4 py-3 border">Nama</th>
                                <th class="px-4 py-3 border text-center">Wilayah</th>
                                <th class="px-4 py-3 border">Rekening</th>
                                <th class="px-4 py-3 border no-print text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm divide-y"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'desa-rambatan-03';

        let dataWarga = [];
        let unsubscribe = null;

        // Login Sederhana (Tanpa Firebase Auth untuk verifikasi user)
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;

            // Ganti kredensial di sini
            if (u === 'admin' && p === 'admin123') {
                sessionStorage.setItem('isLoggedIn', 'true');
                initApp();
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        };

        const initApp = async () => {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') return;

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');

            // Tetap gunakan anon login untuk akses Firestore (Rule 3)
            await signInAnonymously(auth);
            
            const statusInd = document.getElementById('statusIndicator');
            const statusTxt = document.getElementById('statusText');

            // Setup Firestore Listener
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'warga');
            unsubscribe = onSnapshot(colRef, (snap) => {
                dataWarga = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                statusInd.classList.replace('border-red-500', 'border-green-500');
                statusTxt.innerText = "ONLINE";
                statusTxt.classList.replace('text-red-500', 'text-green-500');
                
                renderTable();
            }, (err) => {
                console.error(err);
                statusTxt.innerText = "ERROR PERMISSION";
            });
        };

        window.renderTable = () => {
            const tbody = document.getElementById('tableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            tbody.innerHTML = '';

            const filtered = dataWarga.filter(w => w.nama.toLowerCase().includes(search));
            document.getElementById('statTotal').innerText = dataWarga.length;

            filtered.forEach((w, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-3 border text-center text-gray-400">${i + 1}</td>
                    <td class="px-4 py-3 border font-bold uppercase">${w.nama}</td>
                    <td class="px-4 py-3 border text-center"><span class="bg-gray-100 px-2 py-1 rounded text-[10px]">${w.tipeWilayah} ${w.noWilayah}</span></td>
                    <td class="px-4 py-3 border font-mono text-xs">${w.rekening}</td>
                    <td class="px-4 py-3 border no-print text-center">
                        <button onclick="editData('${w.id}')" class="text-blue-600 mr-2 text-xs font-bold">EDIT</button>
                        <button onclick="deleteData('${w.id}')" class="text-red-600 text-xs font-bold">HAPUS</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        document.getElementById('dataForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value || Date.now().toString();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'warga', id);
            
            await setDoc(docRef, {
                nama: document.getElementById('nama').value,
                tipeWilayah: document.getElementById('tipeWilayah').value,
                noWilayah: document.getElementById('noWilayah').value,
                rekening: document.getElementById('rekening').value
            });

            document.getElementById('dataForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('submitBtn').innerText = "Simpan Data";
        };

        window.editData = (id) => {
            const w = dataWarga.find(x => x.id === id);
            document.getElementById('editId').value = w.id;
            document.getElementById('nama').value = w.nama;
            document.getElementById('tipeWilayah').value = w.tipeWilayah;
            document.getElementById('noWilayah').value = w.noWilayah;
            document.getElementById('rekening').value = w.rekening;
            document.getElementById('submitBtn').innerText = "Update Data";
        };

        window.deleteData = async (id) => {
            if(confirm('Hapus data ini?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'warga', id));
            }
        };

        window.handleLogout = () => {
            sessionStorage.clear();
            location.reload();
        };

        window.exportExcel = () => {
            const ws = XLSX.utils.json_to_sheet(dataWarga);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Warga");
            XLSX.writeFile(wb, "DataWarga.xlsx");
        };

        // Periksa sesi saat load
        if (sessionStorage.getItem('isLoggedIn') === 'true') initApp();
    </script>
</body>
</html>
