    <style>

    <!-- Dashboard (Sekarang dimuat duluan sebagai tamu) -->

                </div>
                <div id="adminActions" class="hidden">
                    <button onclick="openModal()" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition">+ Tambah Data</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden border">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tgl Lahir</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No SK</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tahun SK</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Alamat</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No HP</th>
                                <th class="admin-col hidden px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- Area Login di Bawah -->
            <div id="loginScreen" class="mt-12 bg-gray-100 p-8 rounded-2xl border border-gray-200 max-w-md mx-auto">
                <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Login Admin</h2>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <input type="text" id="username" placeholder="Username" class="w-full px-4 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <input type="password" id="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Masuk Sebagai Admin</button>
                </form>
                <div id="loginError" class="hidden mt-4 text-center text-red-500 text-sm">Username/Password Salah!</div>
            </div>
        </main>

        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-full max-w-lg mx-auto rounded-xl shadow-lg z-50 overflow-y-auto p-6">
            <div class="flex justify-between items-center pb-3 border-b mb-4">
                <p class="text-xl font-bold" id="modalTitle">Data Penduduk</p>
                <button onclick="closeModal()" class="text-gray-400">✕</button>
            </div>
            <form id="pendudukForm" class="space-y-4">
                <input type="hidden" id="editIndex">
                <input type="text" id="formNama" placeholder="Nama" class="w-full p-2 border rounded-lg" required>
                <input type="text" id="formTgl" placeholder="Tgl Lahir" class="w-full p-2 border rounded-lg" required>
                <input type="text" id="formSK" placeholder="No SK" class="w-full p-2 border rounded-lg" required>
                <input type="number" id="formTahun" placeholder="Tahun SK" class="w-full p-2 border rounded-lg" required>
                <textarea id="formAlamat" placeholder="Alamat" class="w-full p-2 border rounded-lg" required></textarea>
                <input type="text" id="formHP" placeholder="No HP" class="w-full p-2 border rounded-lg" required>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg">Simpan</button>
            </form>
        </div>
