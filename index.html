<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Penduduk Rambatan Wetan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 pb-10">

    <div id="dashboard">
        <header class="bg-white border-b sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <span class="text-xl font-bold text-blue-600">Rambatan Wetan</span>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Cari Nama:</label>
                    <input type="text" id="searchInput" oninput="renderTable()" placeholder="Ketik nama..." class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Filter Wilayah:</label>
                    <select id="filterWilayah" onchange="renderTable()" class="w-full p-2 border rounded-lg">
                        <option value="Semua">Semua Wilayah</option>
                        <optgroup label="RT" id="optRT"></optgroup>
                        <optgroup label="RW" id="optRW"></optgroup>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Nama</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Wilayah</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Alamat</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">WhatsApp</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>

            { nama: "HASAN", wilayah: "RT 3", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "085942112378" },

            { nama: "CARITA", wilayah: "RT 7", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "083898182549" },
            { nama: "RASUDI", wilayah: "RW 7", alamat: "Desa Rambatan Wetan, Blok C", hp: "087852408999" },

            { nama: "SURYADI", wilayah: "RT 12", alamat: "Desa Rambatan Wetan, Wanapraya Blok B", hp: "081818473784" },

            { nama: "SANUSI", wilayah: "RT 28", alamat: "Desa Rambatan Wetan, Jl. Kampungan Blok D", hp: "087825250221" },
            { nama: "SARBINI", wilayah: "RT 29", alamat: "Desa Rambatan Wetan, Pecuk, Blok D", hp: "085134395331" },
            { nama: "SARNIJAH", wilayah: "RT 30", alamat: "Desa Rambatan Wetan Blok D", hp: "087817133110" }
        ];

        function initFilter() {
            const rts = [...new Set(pendudukData.filter(d => d.wilayah.startsWith('RT')).map(d => d.wilayah))].sort((a,b) => parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]));
            const rws = [...new Set(pendudukData.filter(d => d.wilayah.startsWith('RW')).map(d => d.wilayah))].sort((a,b) => parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]));
            rts.forEach(rt => document.getElementById('optRT').innerHTML += `<option value="${rt}">${rt}</option>`);
            rws.forEach(rw => document.getElementById('optRW').innerHTML += `<option value="${rw}">${rw}</option>`);
        }

        function renderTable() {
            const filterWilayah = document.getElementById('filterWilayah').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            const filtered = pendudukData.filter(d => {
                const matchWilayah = (filterWilayah === "Semua" || d.wilayah === filterWilayah);
                const matchNama = d.nama.toLowerCase().includes(searchTerm);
                return matchWilayah && matchNama;
            });
            
            filtered.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-4 py-3 font-semibold text-gray-900">${item.nama}</td>
                        <td class="px-4 py-3 text-sm">${item.wilayah}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${item.alamat}</td>
                        <td class="px-4 py-3">
                            <a href="https://wa.me/${item.hp.replace(/^0/, '62')}" target="_blank" class="flex items-center gap-2 bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600 transition w-fit">
                                <span>WhatsApp</span>
                            </a>
                        </td>
                    </tr>
                `;
            });
        }

        initFilter();
        renderTable();
    </script>
</body>
</html>
