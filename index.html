    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.25s ease; }
        /* Tampilan mobile card */
        @media (max-width: 640px) {
            .mobile-hide { display: none; }
            .card-view { display: block !important; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 pb-10">

    <div id="dashboard">
        <header class="bg-white border-b sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <span class="text-xl font-bold text-blue-600 truncate">Rambatan Wetan</span>
                    <div class="text-right">
                        <p class="text-xs font-medium text-gray-900" id="userDisplayName">Tamu</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-4 sm:py-8">
            <div class="mb-6 grid grid-cols-2 sm:flex sm:flex-wrap gap-2 justify-center sm:justify-start">
                <button onclick="downloadPDF()" class="px-3 py-2 bg-red-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-red-700">PDF</button>
                <button onclick="downloadExcel()" class="px-3 py-2 bg-green-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-green-700">Excel</button>
                <button onclick="downloadWord()" class="px-3 py-2 bg-blue-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-blue-700">Word</button>
                <div id="adminActions" class="hidden col-span-2 sm:col-span-1">
                    <button onclick="openModal()" class="w-full sm:w-auto px-4 py-2 bg-indigo-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-indigo-700">+ Tambah Data</button>
                </div>
            </div>

            <!-- Wrapper Tabel Responsif -->
            <div class="bg-white rounded-xl shadow border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-[10px] sm:text-xs font-bold text-gray-500 uppercase">Nama/SK</th>
                                <th class="px-4 py-3 text-left text-[10px] sm:text-xs font-bold text-gray-500 uppercase mobile-hide">Tgl Lahir</th>
                                <th class="px-4 py-3 text-left text-[10px] sm:text-xs font-bold text-gray-500 uppercase mobile-hide">Tahun</th>
                                <th class="px-4 py-3 text-left text-[10px] sm:text-xs font-bold text-gray-500 uppercase">HP/Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200 text-xs sm:text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="loginScreen" class="mt-8 bg-white p-6 rounded-2xl border max-w-sm mx-auto shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 mb-4 text-center">Login Admin</h2>
                <form id="loginForm" class="space-y-3">
                    <input type="text" id="username" placeholder="Username" class="w-full px-4 py-3 border rounded-lg text-sm" required>
                    <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border rounded-lg text-sm" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold text-sm">Masuk</button>
                </form>
                <div id="loginError" class="hidden mt-3 text-center text-red-500 text-xs">Login Gagal!</div>
            </div>
        </main>
    </div>

    <div id="dataModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 p-4">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-full max-w-lg rounded-xl shadow-lg z-50 p-6 overflow-y-auto max-h-[90vh]">
            <p class="text-lg font-bold mb-4">Form Data</p>
            <form id="pendudukForm" class="space-y-3">
                <input type="text" id="formNama" placeholder="Nama" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="formTgl" placeholder="Tgl Lahir" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="formSK" placeholder="No SK" class="w-full p-3 border rounded-lg" required>
                <input type="number" id="formTahun" placeholder="Tahun SK" class="w-full p-3 border rounded-lg" required>
                <textarea id="formAlamat" placeholder="Alamat" class="w-full p-3 border rounded-lg"></textarea>
                <input type="text" id="formHP" placeholder="No HP" class="w-full p-3 border rounded-lg" required>
                <div class="flex gap-2">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 py-3 rounded-lg">Batal</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg">Simpan</button>
                </div>
            </form>
        </div>
    </div>

        let currentUser = { username: "Tamu", role: "Viewer" };

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            pendudukData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-3 py-3 font-medium text-gray-900">${item.nama}<br><span class="text-[10px] text-gray-500">SK: ${item.sk}</span></td>
                    <td class="px-3 py-3 mobile-hide">${item.tgl}</td>
                    <td class="px-3 py-3 mobile-hide">${item.tahun}</td>
                    <td class="px-3 py-3">
                        <span class="block text-[10px] text-gray-600 mb-1">${item.hp}</span>
                        ${currentUser.role === 'Admin' ? `<button onclick="openModal(${index})" class="text-indigo-600 font-bold">Edit</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {

            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
