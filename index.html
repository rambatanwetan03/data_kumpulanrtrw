<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Penduduk Rambatan Wetan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div id="dashboard">
        <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 h-14 flex items-center">
                <span class="text-lg font-bold text-blue-600">Rambatan Wetan</span>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-3 py-4">
            <div class="grid grid-cols-1 gap-4 mb-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Cari Nama</label>
                    <input type="text" id="searchInput" oninput="renderTable()" placeholder="Ketik nama..." class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Filter Wilayah</label>
                    <select id="filterWilayah" onchange="renderTable()" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none bg-white shadow-sm">
                        <option value="Semua">Semua Wilayah</option>
                        <optgroup label="RT" id="optRT"></optgroup>
                        <optgroup label="RW" id="optRW"></optgroup>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Profil</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Alamat</th>
                                <th class="px-3 py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Kontak</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>

            { nama: "RASTIMAN", wilayah: "RT 1", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "087887346997" },

            { nama: "SOLEH S", wilayah: "RW 2", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "081321574356" },

            { nama: "ADE IRAWAN", wilayah: "RW 3", alamat: "Rambatan wetan blok B", hp: "085861718699" },
            { nama: "HASAN", wilayah: "RT 3", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "085942112378" },
            { nama: "TARKUDI", wilayah: "RT 4", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "085797901475" },

            { nama: "SAKUDIN", wilayah: "RT 5", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "085798070713" },
            { nama: "RATNA", wilayah: "RW 6", alamat: "Desa Rambatan Wetan, Panggang Blok C", hp: "081904021042" },
            { nama: "RASWADI", wilayah: "RT 6", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "087757240470" },
            { nama: "CARITA", wilayah: "RT 7", alamat: "Desa Rambatan Wetan, Barat Blok A", hp: "083898182549" },
            { nama: "RASUDI", wilayah: "RW 7", alamat: "Desa Rambatan Wetan, Blok C", hp: "087852408999" },
            { nama: "TARUDIN", wilayah: "RW 8", alamat: "Desa Rambatan Wetan, Pecuk Blok B", hp: "087757403211" },

            { nama: "CASITA", wilayah: "RT 9", alamat: "Desa Rambatan Wetan, Wanapraya Blok B", hp: "082119896080" },
            { nama: "TADI", wilayah: "RT 10", alamat: "Desa Rambatan Wetan, Blok B", hp: "081313643082" },
            { nama: "TADI", wilayah: "RT 11", alamat: "Desa Rambatan Wetan, Wanapraya Blok B", hp: "085724304717" },
            { nama: "SURYADI", wilayah: "RT 12", alamat: "Desa Rambatan Wetan, Wanapraya Blok B", hp: "081818473784" },
            { nama: "NONO KARSONO", wilayah: "RT 13", alamat: "Desa Rambatan Wetan, Blok B", hp: "08977114793" },
            { nama: "ABDUL KHOLIL", wilayah: "RT 14", alamat: "Desa Rambatan Wetan Blok B", hp: "0895326253275" },
            { nama: "NASAEDI", wilayah: "RT 15", alamat: "Desa Rambatan Wetan, Blok B", hp: "085221908019" },

            { nama: "RIYANTO", wilayah: "RT 17", alamat: "Desa Rambatan Wetan, Blok C", hp: "081219856798" },
            { nama: "KADNAWI", wilayah: "RT 18", alamat: "Rambatan Wetan Blok C", hp: "081339714263" },
            { nama: "NONO", wilayah: "RT 19", alamat: "Desa Rambatan Wetan, Blok C", hp: "0895403035413" },
            { nama: "TADI", wilayah: "RT 20", alamat: "Desa Rambatan Wetan, Loa Blok C", hp: "082310371718" },
            { nama: "TAPING", wilayah: "RT 21", alamat: "Desa Rambatan Wetan, Loa Blok C", hp: "087858112367" },
            { nama: "WARJO", wilayah: "RT 22", alamat: "Desa Rambatan Wetan, Panggang Blok C", hp: "087878289658" },
            { nama: "DULANI", wilayah: "RT 23", alamat: "Desa Rambatan Wetan, Blok C", hp: "08224355146" },
            { nama: "CASWADI", wilayah: "RT 24", alamat: "Desa Rambatan Wetan, Karang Baru Blok C", hp: "0895428568880" },
            { nama: "SUKI", wilayah: "RT 25", alamat: "Desa Rambatan Wetan, Karang Malang Blok C", hp: "087847474203" },
            { nama: "TARMIN", wilayah: "RT 26", alamat: "Desa Rambatan Wetan Blok C", hp: "08978391418" },
            { nama: "WARNITA", wilayah: "RT 27", alamat: "Desa Rambatan Wetan, Karang Malang, Blok C", hp: "082128824668" },
            { nama: "SANUSI", wilayah: "RT 28", alamat: "Desa Rambatan Wetan, Jl. Kampungan Blok D", hp: "087825250221" },
            { nama: "SARBINI", wilayah: "RT 29", alamat: "Desa Rambatan Wetan, Pecuk, Blok D", hp: "085134395331" },
            { nama: "SARNIJAH", wilayah: "RT 30", alamat: "Desa Rambatan Wetan Blok D", hp: "087817133110" }
        ];

        function initFilter() {
            const rts = [...new Set(pendudukData.filter(d => d.wilayah.startsWith('RT')).map(d => d.wilayah))].sort((a,b) => parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]));
            const rws = [...new Set(pendudukData.filter(d => d.wilayah.startsWith('RW')).map(d => d.wilayah))].sort((a,b) => parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]));
            rts.forEach(rt => document.getElementById('optRT').innerHTML += `<option value="${rt}">${rt}</option>`);
            rws.forEach(rw => document.getElementById('optRW').innerHTML += `<option value="${rw}">${rw}</option>`);
        }

        function renderTable() {
            const filterWilayah = document.getElementById('filterWilayah').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            const filtered = pendudukData.filter(d => {
                const matchWilayah = (filterWilayah === "Semua" || d.wilayah === filterWilayah);
                const matchNama = d.nama.toLowerCase().includes(searchTerm);
                return matchWilayah && matchNama;
            });
            
            filtered.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50/50 transition">
                        <td class="px-3 py-4">
                            <div class="font-bold text-gray-900 text-sm">${item.nama}</div>
                            <div class="text-[10px] text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded-md inline-block mt-1">${item.wilayah}</div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-500">${item.alamat}</td>
                        <td class="px-3 py-3 text-center">
                            <a href="https://wa.me/${item.hp.replace(/^0/, '62')}" target="_blank" class="flex flex-col items-center justify-center gap-1 text-green-600 hover:text-green-700">
                                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.372-.025-.521-.075-.148-.67-1.613-.918-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                <span class="text-[9px] font-bold">Chat</span>
                            </a>
                        </td>
                    </tr>
                `;
            });
        }

        initFilter();
        renderTable();
    </script>
</body>
</html>
